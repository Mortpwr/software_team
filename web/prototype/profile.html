<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>党团学 App - 个人中心</title>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "PingFang SC", "system-ui", "sans-serif"] } } } };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <link rel="stylesheet" href="./assets/shared.css" />
  <script src="./assets/shared.js"></script>
</head>
<body class="prototype-phone">
  <div id="app" class="app-screen page-enter">
    <header class="top-glass">
      <div class="statusbar">
        <span>{{ now }}</span>
        <span class="flex items-center gap-1">
          <span class="iconify text-[15px]" data-icon="solar:wi-fi-router-bold"></span>
          <span class="iconify text-[17px]" data-icon="solar:battery-charge-bold"></span>
        </span>
      </div>
      <div class="nav-title">
        <div>
          <p class="text-xs font-bold text-blue-600">Growth Profile</p>
          <h1 class="text-2xl font-black tracking-tight">个人中心</h1>
        </div>
        <button class="ripple pressable grid h-11 w-11 place-items-center rounded-2xl bg-white/80 shadow-lg">
          <span class="iconify text-xl text-slate-700" data-icon="solar:settings-bold-duotone"></span>
        </button>
      </div>
    </header>

    <main>
      <section class="relative overflow-hidden rounded-[2rem] bg-slate-950 p-5 text-white shadow-2xl">
        <img class="absolute inset-0 h-full w-full object-cover opacity-36"
          src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=900&q=85" alt="" />
        <div class="absolute inset-0 bg-gradient-to-br from-blue-700/72 via-slate-950/46 to-rose-500/62"></div>
        <div class="relative z-10 flex items-center gap-4">
          <img class="h-20 w-20 rounded-[1.7rem] object-cover ring-4 ring-white/25"
            src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=300&q=85" alt="" />
          <div>
            <h2 class="text-2xl font-black">李同学</h2>
            <p class="mt-1 text-sm font-semibold text-white/78">2023级 · 新闻传播学院 · 共青团员</p>
            <div class="mt-3 flex gap-2">
              <span class="rounded-full bg-white/18 px-3 py-1 text-xs font-black backdrop-blur-xl">先锋指数 92</span>
              <span class="rounded-full bg-white/18 px-3 py-1 text-xs font-black backdrop-blur-xl">校级优秀</span>
            </div>
          </div>
        </div>
      </section>

      <section class="mt-5 grid grid-cols-3 gap-3">
        <article v-for="item in points" :key="item.label" class="reveal card p-4">
          <div class="mb-3 grid h-10 w-10 place-items-center rounded-2xl bg-gradient-to-br text-white shadow-lg" :class="item.tone">
            <span class="iconify text-xl" :data-icon="item.icon"></span>
          </div>
          <p class="text-xl font-black">{{ item.value }}</p>
          <p class="mt-1 text-[11px] font-bold text-slate-400">{{ item.label }}</p>
        </article>
      </section>

      <section class="mt-5 card p-5">
        <div class="mb-4 flex items-center justify-between">
          <div>
            <p class="text-xs font-black text-orange-500">Growth Path</p>
            <h2 class="text-lg font-black">成长轨迹</h2>
          </div>
          <button class="ripple pressable rounded-2xl bg-blue-50 px-3 py-2 text-xs font-black text-blue-600">导出档案</button>
        </div>
        <div class="relative pl-5">
          <div class="absolute bottom-2 left-[9px] top-2 w-0.5 rounded-full bg-slate-100"></div>
          <div v-for="(task, index) in tasks" :key="task.text" class="reveal relative mb-5 last:mb-0">
            <div class="absolute -left-5 top-1 grid h-5 w-5 place-items-center rounded-full bg-white shadow">
              <span class="h-2.5 w-2.5 rounded-full" :class="index === 2 ? 'bg-emerald-400' : 'bg-blue-500'"></span>
            </div>
            <div class="flex items-center justify-between gap-3">
              <div class="flex items-center gap-3">
                <span class="iconify text-2xl text-blue-500" :data-icon="task.icon"></span>
                <p class="text-sm font-black leading-snug">{{ task.text }}</p>
              </div>
              <span class="shrink-0 rounded-full px-2 py-1 text-[11px] font-black"
                :class="task.state === '已完成' ? 'bg-emerald-50 text-emerald-500' : 'bg-orange-50 text-orange-500'">
                {{ task.state }}
              </span>
            </div>
          </div>
        </div>
      </section>

      <section class="mt-5 grid grid-cols-2 gap-3">
        <button v-for="item in menus" :key="item.label" class="reveal ripple pressable card flex items-center gap-3 p-4 text-left">
          <span class="iconify text-2xl text-slate-700" :data-icon="item.icon"></span>
          <span class="text-sm font-black">{{ item.label }}</span>
        </button>
      </section>
    </main>

    <nav class="tabbar glass">
      <a v-for="tab in tabItems" :key="tab.id" :href="tab.href" :class="{ active: tab.id === active }">
        <span class="iconify" :data-icon="tab.icon"></span>
        <span>{{ tab.label }}</span>
      </a>
    </nav>
  </div>

  <script>
    const { createApp, onMounted } = Vue;
    createApp({
      setup() {
        const shell = CampusProto.createAppShell("profile");
        const menus = [
          { label: "我的报名", icon: "solar:ticket-bold-duotone" },
          { label: "学习证书", icon: "solar:diploma-bold-duotone" },
          { label: "团员档案", icon: "solar:folder-with-files-bold-duotone" },
          { label: "消息订阅", icon: "solar:bell-bold-duotone" },
        ];
        onMounted(() => shell.setupInteractions(document));
        return { ...shell, points: CampusProto.points, tasks: CampusProto.tasks, menus };
      },
    }).mount("#app");
  </script>
</body>
</html>
