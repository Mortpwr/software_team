<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>党团学 App - 首页资讯</title>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "PingFang SC", "system-ui", "sans-serif"] },
          boxShadow: { glow: "0 20px 50px rgba(37,99,235,.22)" },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
  <link rel="stylesheet" href="./assets/shared.css" />
  <script src="./assets/shared.js"></script>
</head>
<body class="prototype-phone">
  <div id="app" class="app-screen page-enter">
    <header class="top-glass">
      <div class="statusbar">
        <span>{{ now }}</span>
        <span class="flex items-center gap-1">
          <span class="iconify text-[15px]" data-icon="solar:wi-fi-router-bold"></span>
          <span class="iconify text-[17px]" data-icon="solar:battery-charge-bold"></span>
        </span>
      </div>
      <div class="nav-title">
        <div>
          <p class="text-xs font-bold text-blue-600">青年在线</p>
          <h1 class="text-2xl font-black tracking-tight">党团学服务</h1>
        </div>
        <button class="ripple pressable grid h-11 w-11 place-items-center rounded-2xl bg-white/80 shadow-lg">
          <span class="iconify text-xl text-slate-700" data-icon="solar:bell-bing-bold-duotone"></span>
        </button>
      </div>
    </header>

    <main>
      <section class="hero-gradient relative overflow-hidden rounded-[2rem] p-5 text-white shadow-glow"
        style="--hero-image: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=900&q=85')">
        <div class="absolute inset-0 bg-slate-950/18"></div>
        <div class="relative z-10">
          <div class="mb-12 flex items-center justify-between">
            <span class="rounded-full bg-white/22 px-3 py-1 text-xs font-bold backdrop-blur-xl">今日重点</span>
            <span class="rounded-full bg-white/22 px-3 py-1 text-xs font-bold backdrop-blur-xl">3 条待读</span>
          </div>
          <h2 class="max-w-[260px] text-3xl font-black leading-tight">五月主题团日活动指引已发布</h2>
          <p class="mt-3 max-w-[260px] text-sm leading-6 text-white/86">用更轻的入口聚合资讯、活动、学习与个人积分，让校园成长轨迹一屏可见。</p>
          <button class="ripple pressable mt-5 rounded-2xl bg-white px-4 py-3 text-sm font-black text-blue-600 shadow-xl">查看详情</button>
        </div>
      </section>

      <section class="mt-5 grid grid-cols-3 gap-3">
        <button v-for="item in quick" :key="item.label" class="reveal ripple pressable card p-4 text-left">
          <span class="iconify mb-3 text-2xl" :class="item.color" :data-icon="item.icon"></span>
          <p class="text-sm font-black">{{ item.label }}</p>
          <p class="mt-1 text-[11px] font-semibold text-slate-400">{{ item.desc }}</p>
        </button>
      </section>

      <section class="mt-7 flex items-end justify-between">
        <div>
          <p class="text-xs font-bold text-orange-500">Campus News</p>
          <h2 class="text-xl font-black">资讯动态</h2>
        </div>
        <button class="text-sm font-black text-blue-600">全部</button>
      </section>

      <section v-if="loading" class="mt-4 space-y-4">
        <div v-for="n in 3" :key="n" class="card flex gap-4 p-3">
          <div class="skeleton h-24 w-24 rounded-[1.5rem]"></div>
          <div class="flex-1 py-2">
            <div class="skeleton h-4 w-24 rounded-full"></div>
            <div class="skeleton mt-4 h-5 w-full rounded-full"></div>
            <div class="skeleton mt-3 h-4 w-2/3 rounded-full"></div>
          </div>
        </div>
      </section>

      <section v-else class="mt-4 space-y-4">
        <article v-for="item in news" :key="item.title" class="reveal ripple card flex gap-4 p-3">
          <img :src="item.image" class="h-24 w-24 rounded-[1.5rem] object-cover" alt="" />
          <div class="min-w-0 flex-1">
            <div class="flex items-center gap-2">
              <span class="rounded-full bg-blue-50 px-2 py-1 text-[11px] font-black text-blue-600">{{ item.tag }}</span>
              <span v-if="item.hot" class="rounded-full bg-orange-50 px-2 py-1 text-[11px] font-black text-orange-500">置顶</span>
            </div>
            <h3 class="mt-2 line-clamp-2 text-base font-black leading-snug">{{ item.title }}</h3>
            <p class="mt-1 line-clamp-2 text-xs leading-5 text-slate-500">{{ item.summary }}</p>
          </div>
        </article>
      </section>
    </main>

    <nav class="tabbar glass">
      <a v-for="tab in tabItems" :key="tab.id" :href="tab.href" :class="{ active: tab.id === active }">
        <span class="iconify" :data-icon="tab.icon"></span>
        <span>{{ tab.label }}</span>
      </a>
    </nav>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;
    createApp({
      setup() {
        const shell = CampusProto.createAppShell("home");
        const loading = ref(true);
        const quick = [
          { label: "团日", desc: "活动指引", icon: "solar:flag-2-bold-duotone", color: "text-blue-600" },
          { label: "报名", desc: "志愿实践", icon: "solar:calendar-add-bold-duotone", color: "text-orange-500" },
          { label: "学习", desc: "打卡进度", icon: "solar:book-bold-duotone", color: "text-emerald-500" },
        ];
        onMounted(() => {
          window.setTimeout(() => {
            loading.value = false;
            requestAnimationFrame(() => shell.setupInteractions(document));
          }, 520);
        });
        return { ...shell, quick, loading, news: CampusProto.news };
      },
    }).mount("#app");
  </script>
</body>
</html>
